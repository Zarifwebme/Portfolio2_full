{% with id=widget.attrs.id %}
<style>
  .stack-grid-wrap {
    display: grid;
    grid-template-columns: repeat(4, minmax(180px, 1fr));
    gap: 14px;
    margin-top: 6px;
  }

  .stack-grid-col {
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 10px;
    background: #fff;
  }

  .stack-grid-title {
    font-weight: 700;
    margin-bottom: 8px;
    color: #1f2937;
  }

  .stack-grid-col ul {
    margin: 0;
    padding: 0;
  }

  .stack-grid-col li {
    list-style: none;
    margin: 0 0 6px;
  }

  .stack-grid-col li:last-child {
    margin-bottom: 0;
  }

  @media (max-width: 1100px) {
    .stack-grid-wrap {
      grid-template-columns: repeat(2, minmax(180px, 1fr));
    }
  }

  @media (max-width: 700px) {
    .stack-grid-wrap {
      grid-template-columns: 1fr;
    }
  }
</style>

<div{% if id %} id="{{ id }}"{% endif %} class="stack-grid-wrap">
  {% for group, options, index in widget.optgroups %}
    <div class="stack-grid-col">
      <div class="stack-grid-title">{{ group }}</div>
      <ul>
        {% for option in options %}
          <li>{% include option.template_name with widget=option %}</li>
        {% endfor %}
      </ul>
    </div>
  {% endfor %}
</div>
{% endwith %}
